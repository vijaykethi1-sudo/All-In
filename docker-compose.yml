services:
  backend:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pip install -r requirements.txt && fastapi run app/main.py --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend
